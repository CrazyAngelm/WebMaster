# 📁 docker-compose.yml - Main Docker Compose configuration
# 🎯 Core function: Orchestrate all services for WebMaster application
# 🔗 Key dependencies: PostgreSQL, Node.js
# 💡 Usage: Complete application stack with database

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: webmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webmaster
      POSTGRES_USER: webmaster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webmaster123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - webmaster-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmaster -d webmaster"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: webmaster-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://webmaster:${POSTGRES_PASSWORD:-webmaster123}@postgres:5432/webmaster
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - webmaster-network
    volumes:
      - ./server/prisma:/app/prisma:ro
    healthcheck:
      test: ["CMD", "node", "dist/health-check.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webmaster-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - webmaster-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for session storage and caching (optional)
  redis:
    image: redis:7-alpine
    container_name: webmaster-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webmaster-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  webmaster-network:
    driver: bridge
